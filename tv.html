<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TV Turnero</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
</head>
<body class="bg-[#020617] text-white p-12 overflow-hidden" x-data="tvApp()">
    <div class="grid grid-cols-2 gap-20 h-full">
        <div><h2 class="text-3xl font-black mb-8 opacity-50 uppercase">Preparando</h2><div class="bg-white/5 h-full rounded-[3rem] p-10 grid grid-cols-2 gap-4">
            <template x-for="o in preparing"><div class="text-7xl font-black text-center" x-text="o.table"></div></template>
        </div></div>
        <div><h2 class="text-3xl font-black mb-8 text-cyan-400 uppercase">Listo</h2><div class="bg-cyan-500/10 h-full rounded-[3rem] p-10 grid grid-cols-1 gap-4 border-4 border-cyan-500">
            <template x-for="o in ready"><div class="text-9xl font-black text-center text-cyan-400" x-text="o.table"></div></template>
        </div></div>
    </div>
    <audio id="ding"><source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>
    <script>
        const bc = new BroadcastChannel('restaurant_sync');
        function tvApp() {
            return {
                preparing: [], ready: [],
                init() {
                    bc.onmessage = (e) => {
                        if(e.data.type === 'NEW_ORDER') this.preparing.push(e.data.order);
                        if(e.data.type === 'ORDER_READY') {
                            const o = this.preparing.find(x => x.id === e.data.id);
                            if(o) { this.ready.unshift(o); this.preparing = this.preparing.filter(x => x.id !== e.data.id); document.getElementById('ding').play(); }
                        }
                    }
                }
            }
        }
    </script>
</body>
</html>
